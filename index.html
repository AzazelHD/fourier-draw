<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fourier Epicycles</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body data-theme="dark">
    <header>
      <form id="top" aria-label="Fourier controls">
        <fieldset aria-label="Theme controls">
          <label class="theme-switch" for="theme-toggle" aria-label="Toggle theme">
            <input type="checkbox" id="theme-toggle" checked />
            <span class="theme-slider" aria-hidden="true">
              <span class="theme-icon moon">
                <svg class="theme-icon-svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
              <span class="theme-icon sun">
                <svg class="theme-icon-svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8" />
                  <path
                    d="M12 2.8V5.1M12 18.9v2.3M5.5 5.5l1.6 1.6M16.9 16.9l1.6 1.6M2.8 12h2.3M18.9 12h2.3M5.5 18.5l1.6-1.6M16.9 7.1l1.6-1.6"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                  />
                </svg>
              </span>
            </span>
          </label>
        </fieldset>

        <fieldset class="input-controls" aria-label="Input controls">
          <label>
            <input type="radio" name="source-mode" value="upload" checked />
            Image
          </label>
          <label>
            <input type="radio" name="source-mode" value="draw" />
            Draw
          </label>
          <label for="image-file">File</label>
          <input type="file" id="image-file" accept="image/*,.svg" />
          <label for="sample-shape-select">Sample</label>
          <select id="sample-shape-select" aria-label="Sample shape">
            <option value="star">Star</option>
            <option value="one-piece-flag">One Piece flag</option>
          </select>
          <button type="button" id="sample-star-btn">Load sample</button>
          <button type="button" id="accept-draw-btn" class="draw-only" hidden disabled>
            Accept
          </button>
          <button type="button" id="clear-draw-btn" class="draw-only" hidden disabled>Clear</button>
        </fieldset>

        <fieldset class="animation-controls" aria-label="Animation controls">
          <label for="terms-range">Harmonics</label>
          <input id="terms-range" type="range" />
          <input id="terms-value" type="number" inputmode="numeric" aria-label="Harmonics value" />

          <label for="speed-range">Speed</label>
          <input id="speed-range" type="range" />
          <output id="speed-value" for="speed-range"></output>

          <button type="button" id="pause-btn" aria-pressed="false">Pause</button>
          <button type="button" id="reset-trace-btn">Reset</button>
        </fieldset>

        <output id="status" role="status" aria-live="polite"></output>
      </form>
    </header>

    <main>
      <section>
        <figure>
          <canvas id="fourier-canvas" aria-label="Canvas with Fourier epicycles"></canvas>
        </figure>
      </section>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
